# from: https://github.com/marketplace/actions/virustotal-github-action#scan-assets-of-a-published-release
name: on_release

permissions:
  contents: read

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      runner:
        description: "Runner pool (override to ubuntu-latest if self-hosted is broken)"
        type: choice
        options:
          - daedalus
          - arkanis-runners
          - ubuntu-latest
        default: daedalus

jobs:
  virustotal:
    runs-on: ${{ inputs.runner || vars.RUNNER_DEFAULT || 'daedalus' }}
    permissions:
      # required to write GitHub Release body
      contents: write
    steps:
      - name: VirusTotal Scan
        uses: crazy-max/ghaction-virustotal@v5
        with:
          vt_api_key: ${{ secrets.VT_API_KEY }}
          update_release_body: true
          files: |
            .exe$
            .zip$
