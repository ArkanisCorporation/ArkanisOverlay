name: Deploy pipeline

concurrency:
  group: deploy
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

on:
  workflow_dispatch:
    inputs:
      runner:
        description: "Runner pool (override to ubuntu-latest if self-hosted is broken)"
        type: choice
        options:
          - daedalus
          - arkanis-runners
          - ubuntu-latest
        default: daedalus
  workflow_call:
    inputs:
      image_ref:
        type: string
        required: true
      runner:
        description: "Runner pool"
        required: false
        type: string
        default: daedalus

jobs:
  deploy:
    name: Deployment
    uses: ./.github/workflows/_deploy-coolify.yaml
    with:
      application_name: web demo
      environment_name: ${{ vars.COOLIFY_DEPLOY_ENVIRONMENT }}
      runner: ${{ inputs.runner || vars.RUNNER_DEFAULT || 'daedalus' }}
    secrets:
      COOLIFY_URL: ${{ secrets.COOLIFY_URL }}
      COOLIFY_DEPLOY_UUID: ${{ secrets.COOLIFY_DEPLOY_UUID }}
      COOLIFY_DEPLOY_TOKEN: ${{ secrets.COOLIFY_DEPLOY_TOKEN }}
