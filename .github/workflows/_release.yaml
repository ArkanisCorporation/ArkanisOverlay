name: .NET Release

permissions:
  contents: write       # for publishing a GitHub release and creating release backpropagation PRs
  issues: write         # for commenting on released issues
  pull-requests: write  # for commenting on released pull requests and creating release backpropagation PRs
  packages: write       # for publishing packages in repository registry
  id-token: write       # for Azure Code Signing & Credential Federation

on:
  workflow_dispatch:
    inputs:
      runner:
        description: "Runner pool (override to ubuntu-latest if self-hosted is broken)"
        type: choice
        options:
          - daedalus
          - arkanis-runners
          - ubuntu-latest
        default: daedalus
  workflow_call:
    inputs:
      dry_run:
        description: "Dry run?"
        required: false
        type: boolean
        default: false
      runner:
        description: "Runner pool"
        required: false
        type: string
        default: daedalus
    outputs:
      new_version:
        description: "Newly published version"
        value: ${{ jobs.release.outputs.new_version }}
      new_tag:
        description: "New tag"
        value: ${{ jobs.release.outputs.new_tag }}
      last_version:
        description: "Previously published version"
        value: ${{ jobs.release.outputs.last_version }}
      last_tag:
        description: "Previous version tag"
        value: ${{ jobs.release.outputs.last_tag }}

env:
  # https://github.com/actions/setup-dotnet?tab=readme-ov-file#reduce-caching-size
  NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages
  REGISTRY: ghcr.io
  # See: https://entra.microsoft.com/#view/Microsoft_AAD_RegisteredApps/ApplicationMenuBlade/~/Credentials/appId/b6acf5c1-f282-4eb0-a3a4-4e87e95fe051/isMSAApp~/false
  # `true` if the current branch is `main`, `release/rc` or `release/stable`
  # empty string otherwise, to ensure conditions evaluate to `false`
  ENABLE_CODE_SIGNING: ${{ contains(fromJson('["main", "release/rc", "release/stable", "ci"]'), github.ref_name) && 'true' || '' }}

jobs:
  release:
    runs-on: ${{ inputs.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-tags: true

      - name: Install Azure CLI
        # azure/login and the Velopack code-signing token step shell out to `az` on
        # the host; the daedalus pool (RUNNER_DEFAULT) does not ship it, so install it.
        uses: elstudio/action-install-azure-cli@v1
        if: env.ENABLE_CODE_SIGNING

      - name: Azure Login
        uses: azure/login@v3
        if: env.ENABLE_CODE_SIGNING
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get Azure API Access Token
        # Fetch the code-signing token on the HOST: `az` is installed above
        # (elstudio/action-install-azure-cli) and azure/login authenticated the host via
        # OIDC. The azure/cli action runs the command inside its own Docker container
        # (mcr.microsoft.com/azure-cli) which does NOT inherit the host login, so on the
        # self-hosted daedalus pool it failed with "Please run 'az login'", yielding an
        # empty token and a failed signing command. Run az directly on the host instead.
        # Token is used for Azure Code Signing in scripts/release-12-verify-win64-velopack.sh.
        if: env.ENABLE_CODE_SIGNING
        run: |
          echo "AZURE_API_ACCESS_TOKEN=$(az account get-access-token --resource https://codesigning.azure.net --query accessToken --output tsv)" >> "$GITHUB_ENV"

      - name: Setup .NET
        id: setup-dotnet
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: "**/packages.lock.json"

      - run: echo "Using .NET ${{ steps.setup-dotnet.outputs.dotnet-version }}"

      - run: echo "Cache hit - ${{ steps.setup-dotnet.outputs.cache-hit }}"

      - name: Set up Java
        uses: actions/setup-java@v5
        if: env.ENABLE_CODE_SIGNING
        with:
          java-version: 17
          distribution: 'temurin'

      - name: Download Jsign
        if: env.ENABLE_CODE_SIGNING
        run: curl -fsSL -O https://github.com/ebourg/jsign/releases/download/7.4/jsign-7.4.jar

      - name: Restore dependencies
        run: dotnet restore --locked-mode

      - name: Set up Docker Buildx (remote BuildKit — self-hosted only)
        uses: docker/setup-buildx-action@v4
        if: inputs.runner == 'arkanis-runners'
        with:
          driver: remote
          endpoint: tcp://buildkitd.buildkit.svc.cluster.local:1234

      - name: Set up Docker Buildx (default — fallback runner)
        uses: docker/setup-buildx-action@v4
        if: inputs.runner != 'arkanis-runners'

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          logout: true

      - name: Setup Node.js
        # cycjimmy/semantic-release-action shells out to `npm ci` to install
        # semantic-release and its plugins. The self-hosted runner pools
        # (daedalus / arkanis-runners) don't ship Node, so `npm` is missing and
        # the Semantic Release step fails with `npm: not found`. Install Node
        # unconditionally so the release runs deterministically on any runner.
        # Pin the current Active LTS (Node 24, EOL 2028-04); satisfies
        # semantic-release 25's engine requirement (^22.14 || >=24.10).
        uses: actions/setup-node@v7
        with:
          node-version: 24

      # determines whether a new version release is mandated
      # if it is, publish scripts are run and new version is tagged and published
      - name: Semantic Release
        uses: cycjimmy/semantic-release-action@v6.0.0
        id: semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PUBLISH_TOKEN }}
          NUGET_PUBLISH_API_KEY: ${{ secrets.NUGET_PUBLISH_API_KEY }}
          DEBUG: ${{ inputs.dry_run && '*' || '' }}
        with:
          ci: ${{ ! inputs.dry_run }}
          dry_run: ${{ inputs.dry_run }}
          semantic_version: 25.0.7
          extra_plugins: |
            @semantic-release/changelog@6.0.3
            @semantic-release/exec@7.1.0

      - run: echo "New release - ${{ steps.semantic-release.outputs.new_release_version || 'no new release' }}"

      - name: Install GitHub CLI
        if: ${{ ! inputs.dry_run && steps.semantic-release.outputs.new_release_version && github.ref == 'refs/heads/release/stable' }}
        run: |
          curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo tee /etc/apt/keyrings/githubcli-archive-keyring.gpg > /dev/null
          sudo chmod go+r /etc/apt/keyrings/githubcli-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null
          sudo apt-get update -qq
          sudo apt-get install -y -qq gh

      - name: Setup Version Backpropagation PR
        if: ${{ ! inputs.dry_run && steps.semantic-release.outputs.new_release_version && github.ref == 'refs/heads/release/stable' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_URL=$(gh pr new --base ${{ github.event.repository.default_branch }} --head ${{ github.ref_name }} --title "Backpropagate release version to default branch: ${{ steps.semantic-release.outputs.new_release_version }}" --body "This is an automated post-release action." --label ci --label automated)
          PR_NUMBER=${PR_URL##*/}
          gh pr merge --merge --auto ${PR_URL}
          curl -X POST \
            -H "Authorization: token ${{ secrets.PR_AUTOMATION_PAT }}" \
            -H "Accept: application/vnd.github+json" \
            "${{ github.api_url }}/repos/${{ github.repository }}/pulls/${PR_NUMBER}/reviews" \
            -d '{"event":"APPROVE"}'

    outputs:
      new_version: ${{ steps.semantic-release.outputs.new_release_version }}
      new_tag: ${{ steps.semantic-release.outputs.new_release_git_tag }}
      last_version: ${{ steps.semantic-release.outputs.last_release_version }}
      last_tag: ${{ steps.semantic-release.outputs.last_release_git_tag }}
